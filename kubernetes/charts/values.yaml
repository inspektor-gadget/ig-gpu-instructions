prometheus:
  server:
    global:
      scrape_interval: 15s
      scrape_timeout: 5s
  kube-state-metrics:
    enabled: false
  alertmanager:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  scrapeConfigs:
    - job_name: 'inspektor-gadget'
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - gpu-observability
      relabel_configs:
        # Only keep pods with label k8s-app=gadget
        - source_labels: [ __meta_kubernetes_pod_label_k8s_app ]
          action: keep
          regex: gadget

        # Force metrics path
        - target_label: __metrics_path__
          replacement: /metrics

        # Force port
        - source_labels: [ __address__ ]
          action: replace
          regex: ([^:]+)(?::\d+)?
          replacement: $1:2224
          target_label: __address__
