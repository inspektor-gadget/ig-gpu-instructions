inspektor-gadget:
  image:
    tag: "mauricio-profile-cuda-rebased"
    repository: "ghcr.io/mauriciovasquezbernal/inspektor-gadget"
  hostPID: true
  nodeSelector:
    # Only deploy on nodes with GPU.
    accelerator: "nvidia"
  config:
    daemonLogLevel: info
    gadgetNamespace: gpu-observability
    operator:
      otel-profiles:
        exporters:
          my-profiles-exporter:
            exporter: otlp-grpc
            compression: gzip
            endpoint: gpu-observability-pyroscope-distributor.gpu-observability.svc.cluster.local:4040
            insecure: true
      otel-metrics:
        otel-metrics-listen: true
        otel-metrics-listen-address: "0.0.0.0:2224"
      oci:
        verify-image: false

pyroscope:
  alloy:
    enabled: false
  architecture:
    microservices:
      enabled: true
    # Better than v1 for scaling.
    storage:
      v2: true
  minio:
    enabled: false
  pyroscope:
    extraArgs:
      store-gateway.sharding-ring.replication-factor: "3"
    # Components taken from:
    # https://github.com/grafana/pyroscope/blob/318871de4599/operations/pyroscope/helm/pyroscope/values-micro-services.yaml
    # Having split components helps scaling.
    components:
      querier:
        kind: Deployment
        # We only have one node for now.
        replicaCount: 1
        resources:
          limits:
            memory: 1Gi
          requests:
            memory: 256Mi
            cpu: 1
      query-frontend:
        kind: Deployment
        replicaCount: 1
        resources:
          limits:
            memory: 1Gi
          requests:
            memory: 256Mi
            cpu: 100m
      query-scheduler:
        kind: Deployment
        replicaCount: 1
        resources:
          limits:
            memory: 1Gi
          requests:
            memory: 256Mi
            cpu: 100m
      distributor:
        kind: Deployment
        replicaCount: 2
        resources:
          limits:
            memory: 1Gi
          requests:
            memory: 256Mi
            cpu: 500m
      ingester:
        kind: StatefulSet
        replicaCount: 3
        terminationGracePeriodSeconds: 600
        resources:
          limits:
            memory: 16Gi
          requests:
            memory: 8Gi
            cpu: 1
      compactor:
        kind: StatefulSet
        replicaCount: 3
        terminationGracePeriodSeconds: 1200
        persistence:
          enabled: false
        resources:
          limits:
            memory: 16Gi
          requests:
            memory: 8Gi
            cpu: 1
      store-gateway:
        kind: StatefulSet
        replicaCount: 3
        persistence:
          # The store-gateway needs not need persistent storage, but we still run it as a StatefulSet
          # This is to avoid having blocks of data being
          enabled: false
        resources:
          limits:
            memory: 16Gi
          requests:
            memory: 8Gi
            cpu: 1
        readinessProbe:
          # The store gateway can be configured to wait on startup for ring stability to be reached before it becomes
          # ready. See the `store-gateway.sharding-ring.wait-stability-min-duration` server argument for more information.
          #
          # Depending on this flag and the number of tenants + blocks that need to be synced on startup, pods can take
          # some time to become ready. This value can be used to ensure Kubernetes waits long enough and reduce errors.
          initialDelaySeconds: 60
      tenant-settings:
        kind: Deployment
        # I do not think we need this.
        replicaCount: 0
        resources:
          limits:
            memory: 4Gi
          requests:
            memory: 16Mi
            cpu: 0.1
      ad-hoc-profiles:
        kind: Deployment
        # We only want to profile using Inspektor Gadget.
        replicaCount: 0
        resources:
          limits:
            memory: 4Gi
          requests:
            memory: 16Mi
            cpu: 0.1
    # The image must be set here and not in upper level. Otherwise, 1.14.0 would
    # be used and communication would not occur.
    # Thanks Mauricio for spotting this!
    image:
      repository: grafana/pyroscope
      tag: "1.15.0"
    structuredConfig:
      self_profiling:
        disable_push: true
      storage:
        backend: filesystem
  service:
    port: 4040
grafana:
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - uid: local-pyroscope
          type: grafana-pyroscope-datasource
          name: Pyroscope
          url: http://gpu-observability-pyroscope-query-frontend.gpu-observability.svc.cluster.local:4040
          jsonData:
            keepCookies: [pyroscope_git_session]
        - uid: prometheus
          name: Prometheus
          type: prometheus
          access: proxy
          url: http://gpu-observability-prometheus-server.gpu-observability.svc.cluster.local:80
          isDefault: true
          editable: false
  env:
    GF_INSTALL_PLUGINS: grafana-pyroscope-app
    GF_AUTH_ANONYMOUS_ENABLED: "true"
    GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    GF_AUTH_DISABLE_LOGIN_FORM: "true"
  dashboardProviders:
