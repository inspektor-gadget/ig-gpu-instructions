apiVersion: v1
kind: Pod
metadata:
  name: gpu-testload-good
  namespace: default
  labels:
    app: gpu-testload
spec:
  terminationGracePeriodSeconds: 0
  restartPolicy: Never
  containers:
    - name: gpu-testload
      image: ghcr.io/inspektor-gadget/testgpu:latest
      imagePullPolicy: Always
      command: ["python", "main.py"]
      resources:
        limits:
          nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Pod
metadata:
  name: gpu-testload-bad
  namespace: default
  labels:
    app: gpu-testload
spec:
  terminationGracePeriodSeconds: 0
  restartPolicy: Never
  containers:
    - name: gpu-testload
      image: ghcr.io/inspektor-gadget/testgpu:latest
      imagePullPolicy: Always
      command: ["python", "main.py"]
      resources:
        limits:
          nvidia.com/gpu: "1"
      env:
        - name: ENABLE_BUG
          value: "1"
